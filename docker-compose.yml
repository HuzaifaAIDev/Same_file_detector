version: "3.9"

services:
  app:
    build: .
    ports:
      - "20285:20285"
    environment:
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      DATABASE_URL: postgresql+psycopg2://filecomparer:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/filecomparer
      CORS_ORIGINS: '["http://localhost:20285"]'
      ENABLE_LOCAL_PATH_COMPARE: "false"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/backend/uploads
      - logs_data:/app/backend/logs
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: filecomparer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: filecomparer
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filecomparer"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db_data:
  uploads_data:
  logs_data:
